<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerTracker — Sign In</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/modal.css" />
    <link rel="stylesheet" href="../assets/css/auth.css" />
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <script>
      (function () {
        if (localStorage.getItem("theme") === "dark")
          document.documentElement.setAttribute("data-theme", "dark");
      })();
    </script>
    <style>
      [data-theme="dark"] body.welcome-page {
        background: linear-gradient(
          135deg,
          #0f1117 0%,
          #1a1d2e 50%,
          #12151f 100%
        );
      }
      [data-theme="dark"] .welcome-card {
        background: var(--surface);
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.5),
          0 0 0 1px var(--border);
      }
      [data-theme="dark"] .login-input {
        background: var(--card-bg);
        color: var(--text);
        border-color: var(--border);
      }

      /* Dark mode toggle */
      .login-dark-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 2.25rem;
        height: 2.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-size: 1rem;
        transition: all 0.2s;
        z-index: 100;
        backdrop-filter: blur(4px);
      }
      .login-dark-toggle:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: rotate(20deg);
      }

      /* Suppress arrow on welcome/login buttons */
      .btn-welcome::after,
      .btn-login::after,
      .get-started::after,
      .have-account::after {
        content: none !important;
        display: none !important;
      }

      [data-theme="dark"] .login-dark-toggle {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body class="welcome-page">
    <!-- Dark mode toggle -->
    <button
      class="login-dark-toggle"
      id="loginDarkToggle"
      title="Toggle dark mode"
    >
      🌙
    </button>

    <!-- Decorative circles -->
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <!-- Login Card -->
    <div class="welcome-card login-card">
      <div class="welcome-logo">
        <span class="logo-text">Career</span
        ><span class="logo-accent">Tracker</span>
      </div>
      <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--text)">
        Sign In
      </h2>

      <div class="login-form">
        <input
          type="email"
          id="usernameInput"
          placeholder="Email"
          class="login-input"
          autocomplete="username"
        />
        <input
          type="password"
          id="passwordInput"
          placeholder="Password"
          class="login-input"
          autocomplete="current-password"
        />
        <button id="loginBtn" class="btn-login">Sign In</button>

        <div class="auth-divider">OR</div>

        <div class="social-buttons">
          <button id="googleLoginBtn" class="social-btn gmail-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align:middle; margin-right:6px;">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
          </button>
        </div>

        <div style="text-align: center; margin-top: 1rem">
          <span style="color: var(--muted)">Don't have an account? </span>
          <a
            href="#"
            id="signupLink"
            style="color: var(--brand); font-weight: 600; text-decoration: none"
            >Sign Up</a
          >
        </div>
      </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal" style="display: none">
      <div class="modal-content signup-modal">
        <span class="close" id="closeSignup">&times;</span>
        <h2>Create Account</h2>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="signupUsername"
            class="login-input"
            placeholder="your@email.com"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="signupPassword"
            class="login-input"
            placeholder="Min. 8 chars with a number"
            autocomplete="new-password"
          />
          <small
            style="
              color: var(--muted);
              font-size: 0.72rem;
              margin-top: 0.3rem;
              display: block;
            "
            >Min. 8 characters, combination of letters &amp; numbers</small
          >
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input
            type="password"
            id="signupConfirmPassword"
            class="login-input"
            placeholder="Confirm password"
            autocomplete="new-password"
          />
        </div>
        <div class="form-group" style="margin-top: 0.75rem">
          <label
            style="
              display: flex;
              align-items: flex-start;
              gap: 0.6rem;
              cursor: pointer;
              font-size: 0.82rem;
              font-weight: 400;
              color: var(--text);
              text-transform: none;
              letter-spacing: 0;
            "
          >
            <input
              type="checkbox"
              id="privacyCheck"
              style="
                margin-top: 2px;
                accent-color: var(--brand);
                flex-shrink: 0;
                width: 16px;
                height: 16px;
              "
            />
            <span
              >I have read and agree to the
              <a
                href="privacy-policy.html"
                target="_blank"
                style="color: var(--brand); font-weight: 600; text-decoration: none"
                >Privacy Policy</a
              >
              and
              <a
                href="terms.html"
                target="_blank"
                style="color: var(--brand); font-weight: 600; text-decoration: none"
                >Terms of Service</a
              >. My data will be stored securely.</span
            >
          </label>
        </div>
        <button id="signupBtn" class="btn-login">Sign Up</button>
        <div style="text-align: center; margin-top: 1rem">
          <span style="color: var(--muted)">Already have an account? </span>
          <a
            href="#"
            id="loginLink"
            style="color: var(--brand); font-weight: 600; text-decoration: none"
            >Sign In</a
          >
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/loginPage.js"></script>
    <script>
      // Dark mode toggle
      document.addEventListener("DOMContentLoaded", function () {
        const btn = document.getElementById("loginDarkToggle");
        const html = document.documentElement;

        function updateIcon() {
          btn.textContent =
            html.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
        }
        updateIcon();

        btn.addEventListener("click", function () {
          const isDark = html.getAttribute("data-theme") === "dark";
          if (isDark) {
            html.removeAttribute("data-theme");
            localStorage.setItem("theme", "light");
          } else {
            html.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark");
          }
          updateIcon();
        });
      });
    </script>
  </body>
</html>
