<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CareerTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #f0ece4;
      --muted:    #6b6760;
      --accent:   #e8d5b0;
      --radius:   14px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(232,213,176,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(180,160,120,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 44px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e8d5b0, #c4a87a);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      font-size: 22px;
      box-shadow: 0 4px 20px rgba(232,213,176,0.2);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px; font-weight: 400;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px; color: var(--muted);
      text-align: center; line-height: 1.6;
      margin-bottom: 40px; max-width: 280px;
    }

    .divider {
      width: 100%; display: flex; align-items: center;
      gap: 12px; margin-bottom: 28px;
      color: var(--muted); font-size: 12px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-google {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px 20px;
      background: #fff; color: #1a1a1a;
      border: none; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .btn-google:hover:not(:disabled) {
      background: #f2f2f2;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    .btn-google:active:not(:disabled) { transform: translateY(0); }
    .btn-google:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-google.loading .g-icon  { display: none; }
    .btn-google.loading .spinner { display: block; }

    .error-msg {
      display: none;
      width: 100%; margin-top: 16px;
      padding: 12px 16px;
      background: rgba(220,70,70,0.1);
      border: 1px solid rgba(220,70,70,0.25);
      border-radius: 10px;
      color: #e07070; font-size: 13px;
      text-align: center; line-height: 1.5;
    }
    .error-msg.show { display: block; }

    .footer-note {
      margin-top: 36px;
      font-size: 12px; color: var(--muted);
      text-align: center; line-height: 1.7;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">✦</div>
  <h1>Selamat datang</h1>
  <p class="subtitle">Masuk untuk melanjutkan ke CareerTracker</p>

  <div class="divider">masuk dengan</div>

  <button class="btn-google" id="loginBtn" onclick="handleLogin()">
    <svg class="g-icon" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <div class="spinner"></div>
    <span id="btnLabel">Lanjutkan dengan Google</span>
  </button>

  <div class="error-msg" id="errMsg"></div>

  <p class="footer-note">
    Dengan masuk, kamu menyetujui<br>
    <a href="#">Ketentuan Layanan</a> &amp; <a href="#">Kebijakan Privasi</a>
  </p>
</div>

<!-- ① Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ② Init client — ganti dua nilai ini dengan milikmu -->
<script>
  window.supabaseClient = supabase.createClient(
    'https://YOUR_PROJECT_ID.supabase.co',  // ← Project URL
    'YOUR_ANON_PUBLIC_KEY'                   // ← Anon/Public key
  );
</script>

<!-- ③ Auth module -->
<script src="../assets/js/auth.js"></script>

<!-- ④ Cek session aktif & login handler -->
<script>
  // ── Cek session begitu halaman dimuat ──────────────────
  // Menangkap kasus: Google redirect balik ke login.html dengan #access_token
  // Supabase JS otomatis parse hash dan buat session.
  // Kita tunggu sebentar agar onAuthStateChange punya waktu terpicu.
  // Kalau 2 detik tidak ada redirect dari listener, kita cek manual.
  let redirected = false;

  setTimeout(async () => {
    if (redirected) return;
    try {
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (session?.user) {
        console.log("[login] session manual ditemukan → redirect");
        redirected = true;
        window.auth.saveUser(session.user);
        await window.auth.syncUserToDB(session.user);
        window.location.href = window.auth._getHomeUrl();
      }
    } catch(e) {
      console.warn("[login] cek session:", e.message);
    }
  }, 1500);

  // Tandai jika listener sudah redirect duluan
  const _origOnChange = window.supabaseClient.auth.onAuthStateChange.bind(
    window.supabaseClient.auth
  );

  // ── Tombol login ───────────────────────────────────────
  async function handleLogin() {
    const btn    = document.getElementById("loginBtn");
    const errEl  = document.getElementById("errMsg");
    const label  = document.getElementById("btnLabel");

    btn.disabled = true;
    btn.classList.add("loading");
    label.textContent = "Mengalihkan ke Google...";
    errEl.classList.remove("show");

    try {
      const result = await window.auth.loginWithGoogle();
      if (!result.success) throw new Error(result.error);
      // Sukses → browser akan redirect ke Google, tidak perlu lakukan apa-apa
    } catch (err) {
      errEl.textContent = err.message || "Gagal masuk. Coba lagi.";
      errEl.classList.add("show");
      btn.disabled = false;
      btn.classList.remove("loading");
      label.textContent = "Lanjutkan dengan Google";
    }
  }
</script>

</body>
</html>
